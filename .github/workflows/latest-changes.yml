name: Latest Changes

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      number:
        description: PR number
        required: true
      debug_enabled:
        description: 'Enable tmate debug session'
        required: false
        default: 'false'

permissions: {}

jobs:
  latest-changes:
    name: Latest Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    timeout-minutes: 5
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT to allow latest-changes to commit back to the main branch.
          # GITHUB_TOKEN is read-only on pull_request_target events by default,
          # so push attempts fail with 403.
          token: ${{ secrets.DORIS_PYTHON_LATEST_CHANGES_TOKEN }}
          persist-credentials: true
      - name: Latest Changes
        uses: tiangolo/latest-changes@eb3f6e7ff0073896ecb561e774a121de9418fa06 # 0.5.0
        with:
          token: ${{ secrets.DORIS_PYTHON_LATEST_CHANGES_TOKEN }}
          latest_changes_file: release-notes.md
          latest_changes_header: '## Latest Changes'
          end_regex: '^## '
          debug_logs: true
          label_header_prefix: '### '
