name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 必须 fetch 完整历史,setuptools-scm 才能读取 tag
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools-scm

      - name: Display version
        run: |
          # setuptools-scm 会从 git tag 自动推断版本号
          python -m setuptools_scm

      - name: Build distributions
        run: |
          # 手动触发且无 tag 时,给一个兜底版本号避免构建失败
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$SETUPTOOLS_SCM_PRETEND_VERSION" ]; then
            echo "SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0+manual" >> $GITHUB_ENV
          fi
          python -m build

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Use PyPI trusted publishing (configure the
          # "publish-python" environment on PyPI and link this repo)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7